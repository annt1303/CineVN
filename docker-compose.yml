services:
  # =========================================================================
  # 1. PostgreSQL Database Service
  # =========================================================================
  postgres-db:
    image: postgres:16-alpine
    container_name: vncinema-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-vncinema}
      POSTGRES_USER: ${DB_USER:-vncinema_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vncinema_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vncinema_user -d vncinema"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vncinema-network

  # =========================================================================
  # 2. Redis Cache & Seat Locking Service
  # =========================================================================
  redis-cache:
    image: redis:7.2-alpine
    container_name: vncinema-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-vncinema_redis_password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "vncinema_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vncinema-network

  # =========================================================================
  # 3. RabbitMQ Message Queue Service
  # =========================================================================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: vncinema-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-cinema}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-cinema123}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vncinema-network

networks:
  vncinema-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
