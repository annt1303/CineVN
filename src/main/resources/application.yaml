spring:
  application:
    name: vncinema

  # Database settings (PostgreSQL)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vncinema}
    username: ${DB_USER:vncinema_user}
    password: ${DB_PASSWORD:vncinema_password}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate settings
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:vncinema_redis_password}
      notify-keyspace-events: Ex

  # RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:cinema}
    password: ${RABBITMQ_PASSWORD:cinema123}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 3
          multiplier: 2.0
          max-interval: 30000
        default-requeue-rejected: false

  # Flyway Database Migration
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    ignore-migration-patterns: "*:missing"
    locations: classpath:db/migration

  # Mail Configuration (Brevo SMTP)
  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${MAIL_USERNAME:default_mail_username}
    password: ${BREVO_SMTP_KEY:default_smtp_key}
    from: ${MAIL_FROM:noreply@vncinema.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
# SpringDoc OpenAPI / Swagger UI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true
    filter: true
  default-produces-media-type: application/json

# JWT Security Configurations
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# Root-level Mail Configuration for @Value("${mail.from}")
mail:
  from: ${MAIL_FROM:noreply@vncinema.com}

# TMDB Configuration
tmdb:
  api:
    token: ${TMDB_API_TOKEN:default_tmdb_token}
    base-url: "https://api.themoviedb.org/3"
    image-base-url: "https://image.tmdb.org/t/p/w500"

